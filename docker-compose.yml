services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nifty
      POSTGRES_USER: nifty
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nifty-local-only}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nifty"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://nifty:${POSTGRES_PASSWORD:-nifty-local-only}@postgres:5432/nifty
      CORS_ORIGINS: http://localhost:3000
      ADMIN_API_KEY: ${ADMIN_API_KEY:-change-me}
      SCHEDULER_ENABLED: "true"
    volumes:
      - model_artifacts:/app/artifacts
      - data_cache:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    depends_on: [backend]
    ports:
      - "3000:80"
    restart: unless-stopped

volumes:
  postgres_data:
  model_artifacts:
  data_cache:

